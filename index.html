<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mon Vocabulaire Français</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --bg-card: #14141f;
    --bg-card-hover: #1a1a2e;
    --surface: #1e1e32;
    --border: #2a2a44;
    --text-primary: #e8e6f0;
    --text-secondary: #9896a8;
    --text-muted: #5c5a6e;
    --accent: #7c6ff7;
    --accent-glow: rgba(124, 111, 247, 0.15);
    --accent-soft: #a59bfa;
    --gold: #f0c674;
    --green: #4ec9a0;
    --rose: #e06c8a;
    --reveal-bg: rgba(124, 111, 247, 0.08);
    --reveal-border: rgba(124, 111, 247, 0.25);
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: ''; position: fixed; top: -30%; left: -10%;
    width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(124, 111, 247, 0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; bottom: -20%; right: -10%;
    width: 50%; height: 50%;
    background: radial-gradient(circle, rgba(224, 108, 138, 0.03) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .header {
    width: 100%; max-width: 640px;
    padding: 48px 24px 24px;
    text-align: center; position: relative; z-index: 1;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary); margin-bottom: 6px;
  }
  .header h1 span { color: var(--accent-soft); }
  .header .subtitle {
    font-size: 0.85rem; color: var(--text-muted);
    font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase;
  }

  .counter {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-top: 20px;
    font-size: 0.8rem; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .counter .current { font-size: 1.1rem; font-weight: 600; color: var(--accent-soft); }
  .progress-track {
    width: 120px; height: 3px;
    background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent); border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Shuffle button */
  .shuffle-btn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem; font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 16px; cursor: pointer;
    transition: all 0.3s ease;
  }
  .shuffle-btn:hover {
    color: var(--accent-soft); border-color: var(--accent);
    background: var(--accent-glow);
  }
  .shuffle-btn .shuffle-icon {
    font-size: 0.9rem;
    transition: transform 0.4s ease;
  }
  .shuffle-btn:active .shuffle-icon { transform: rotate(180deg); }

  .card-container {
    width: 100%; max-width: 560px;
    padding: 0 24px; margin-top: 32px;
    position: relative; z-index: 1;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 48px 40px 40px;
    position: relative; overflow: hidden;
    transition: border-color 0.3s ease;
    text-align: center;
  }
  .card:hover { border-color: rgba(124, 111, 247, 0.2); }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle at top left, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .word-meta {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .word-type, .word-forme {
    display: inline-block;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 20px;
  }
  .word-type {
    color: var(--accent-soft); background: var(--accent-glow);
    border: 1px solid rgba(124, 111, 247, 0.15);
  }
  .word-forme {
    color: var(--gold); background: rgba(240, 198, 116, 0.08);
    border: 1px solid rgba(240, 198, 116, 0.15);
  }

  .french-word {
    font-family: 'Playfair Display', serif;
    font-size: 3rem; font-weight: 700;
    color: var(--text-primary); line-height: 1.1;
    margin-bottom: 8px; letter-spacing: -0.01em;
  }

  .pronunciation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem; font-weight: 300;
    color: var(--gold); margin-bottom: 28px; opacity: 0.9;
  }

  .divider { width: 40px; height: 1px; background: var(--border); margin: 0 auto 24px; }

  .meaning-section { margin-bottom: 24px; }
  .reveal-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 500;
    color: var(--accent-soft); background: var(--reveal-bg);
    border: 1px dashed var(--reveal-border); border-radius: 12px;
    padding: 12px 24px; cursor: pointer;
    transition: all 0.3s ease; width: 100%; justify-content: center;
  }
  .reveal-btn:hover { background: rgba(124, 111, 247, 0.12); border-color: var(--accent-soft); }
  .reveal-btn .icon { font-size: 1rem; transition: transform 0.3s ease; }
  .reveal-btn.revealed .icon { transform: rotate(90deg); }

  .meaning-content {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
    opacity: 0;
  }
  .meaning-content.visible { max-height: 200px; opacity: 1; margin-top: 16px; }

  .english-meaning { font-size: 1.3rem; font-weight: 600; color: var(--green); margin-bottom: 4px; }

  .example-section {
    background: var(--surface); border-radius: 14px;
    padding: 20px 24px; border-left: 3px solid var(--accent);
  }
  .example-label {
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 10px;
  }
  .example-fr {
    font-family: 'Calibri', 'Segoe UI', sans-serif;
    font-size: 1.25rem; font-style: italic;
    color: var(--text-primary); line-height: 1.5; margin-bottom: 8px;
  }
  .example-en {
    font-size: 0.95rem; color: var(--text-secondary);
    font-weight: 300; line-height: 1.5;
  }

  /* Loading */
  .loading-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 60px 20px;
    position: relative; z-index: 1;
  }
  .loading-screen .spinner-lg {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-screen .loading-text {
    font-size: 0.9rem; color: var(--text-muted);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 60px 20px;
    position: relative; z-index: 1; text-align: center;
  }
  .error-screen .error-icon { font-size: 2rem; }
  .error-screen .error-msg {
    font-size: 0.9rem; color: var(--rose); max-width: 400px; line-height: 1.6;
  }
  .error-screen .retry-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 500;
    color: var(--accent-soft); background: var(--accent-glow);
    border: 1px solid var(--accent); border-radius: 10px;
    padding: 10px 24px; cursor: pointer; margin-top: 8px;
    transition: all 0.3s ease;
  }
  .error-screen .retry-btn:hover { background: rgba(124, 111, 247, 0.2); }

  .nav {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-top: 36px; padding-bottom: 60px;
    position: relative; z-index: 1;
  }
  .nav-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--bg-card-hover); border-color: var(--accent);
    color: var(--accent-soft); transform: scale(1.05);
  }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-btn:active:not(:disabled) { transform: scale(0.95); }

  .nav-label {
    font-size: 0.75rem; color: var(--text-muted);
    font-weight: 400; min-width: 40px;
    text-align: center; font-variant-numeric: tabular-nums;
  }

  .keyboard-hint {
    font-size: 0.7rem; color: var(--text-muted);
    text-align: center; padding-bottom: 32px;
    opacity: 0.5; position: relative; z-index: 1;
  }
  .keyboard-hint kbd {
    display: inline-block; padding: 2px 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; margin: 0 2px;
  }

  .hidden { display: none !important; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
  .card.slide-left { animation: slideLeft 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
  .card.slide-right { animation: slideRight 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes slideLeft {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.6rem; }
    .french-word { font-size: 2.2rem; }
    .card { padding: 36px 28px 32px; }
    .keyboard-hint { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Mon <span>Vocabulaire</span></h1>
  <div class="subtitle">Français — Apprentissage Personnel</div>
  <div class="counter">
    <span class="current" id="currentNum">-</span>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar"></div>
    </div>
    <span id="totalNum">/ -</span>
  </div>
  <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleAndReset()">
    <span class="shuffle-icon">⟳</span> Shuffle
  </button>
</div>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner-lg"></div>
  <div class="loading-text">Loading vocabulary from Google Sheets...</div>
</div>

<!-- Error -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">⚠</div>
  <div class="error-msg" id="errorMsg"></div>
  <button class="retry-btn" onclick="loadFromSheets()">Try again</button>
</div>

<!-- Card -->
<div class="card-container hidden" id="cardContainer">
  <div class="card" id="card">
    <div class="word-meta" id="wordMeta">
      <div class="word-type" id="wordType"></div>
      <div class="word-forme" id="wordForme"></div>
    </div>
    <div class="french-word" id="frenchWord"></div>
    <div class="pronunciation" id="pronunciation"></div>
    <div class="divider"></div>

    <div class="meaning-section" id="meaningSection">
      <button class="reveal-btn" id="revealBtn" onclick="toggleMeaning()">
        <span class="icon">›</span> Reveal meaning
      </button>
      <div class="meaning-content" id="meaningContent">
        <div class="english-meaning" id="englishMeaning"></div>
      </div>
    </div>

    <div class="example-section" id="exampleSection">
      <div class="example-label">Exemple</div>
      <div class="example-fr" id="exampleFr"></div>
      <div class="example-en" id="exampleEn"></div>
    </div>
  </div>
</div>

<div class="nav hidden" id="navBar">
  <button class="nav-btn" id="prevBtn" onclick="prevCard()" disabled>‹</button>
  <span class="nav-label" id="navLabel">1 / 1</span>
  <button class="nav-btn" id="nextBtn" onclick="nextCard()">›</button>
</div>

<div class="keyboard-hint hidden" id="keyHint">
  <kbd>←</kbd> previous &nbsp;&nbsp; <kbd>→</kbd> next &nbsp;&nbsp; <kbd>Space</kbd> reveal
</div>

<script>
  // =====================================================
  // GOOGLE SHEETS CONFIG
  // =====================================================
  const SHEET_ID = '1Y_6OktxmY4zOVHiZt3CgW6D_d_gflOZa7v12cRcWsIk';
  const SHEET_NAME = 'Sheet1';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

  // Column mapping (0-indexed):
  // A=0: Word, B=1: Prononciation, C=2: Forme,
  // D=3: Word class, E=4: English meaning,
  // F=5: Simple French sentence, G=6: English translation

  let words = [];
  let currentIndex = 0;
  let meaningRevealed = false;

  // =====================================================
  // SHUFFLE (Fisher-Yates)
  // =====================================================
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function shuffleAndReset() {
    shuffle(words);
    currentIndex = 0;
    renderCard();
    // Spin animation
    const icon = document.querySelector('.shuffle-icon');
    icon.style.transform = 'rotate(360deg)';
    setTimeout(() => { icon.style.transform = ''; }, 400);
  }

  // =====================================================
  // FETCH FROM GOOGLE SHEETS
  // =====================================================
  async function loadFromSheets() {
    document.getElementById('loadingScreen').style.display = 'flex';
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('cardContainer').classList.add('hidden');
    document.getElementById('navBar').classList.add('hidden');
    document.getElementById('keyHint').classList.add('hidden');

    try {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      // Google returns: /*O_o*/ google.visualization.Query.setResponse({...});
      const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+?)\);/);
      if (!jsonStr) throw new Error('Could not parse Sheets response');
      const json = JSON.parse(jsonStr[1]);
      const rows = json.table.rows;

      words = rows.map(row => {
        const c = row.c;
        return {
          word:      c[0] ? (c[0].v || '') : '',
          pron:      c[1] ? (c[1].v || '') : '',
          forme:     c[2] ? (c[2].v || '') : '',
          type:      c[3] ? (c[3].v || '') : '',
          meaning:   c[4] ? (c[4].v || '') : '',
          exampleFr: c[5] ? (c[5].v || '') : '',
          exampleEn: c[6] ? (c[6].v || '') : '',
        };
      }).filter(w => w.word.trim() !== '');

      if (words.length === 0) {
        throw new Error('No words found in the sheet.');
      }

      // Shuffle on load
      shuffle(words);
      currentIndex = 0;

      // Show UI
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('cardContainer').classList.remove('hidden');
      document.getElementById('navBar').classList.remove('hidden');
      document.getElementById('keyHint').classList.remove('hidden');

      renderCard();

    } catch (err) {
      console.error('Sheets load error:', err);
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'flex';
      document.getElementById('errorMsg').textContent =
        'Could not load data from Google Sheets. Make sure the sheet is published to web (File → Share → Publish to web).';
    }
  }

  // =====================================================
  // RENDER CARD
  // =====================================================
  function renderCard(direction) {
    if (words.length === 0) return;
    const card = document.getElementById('card');
    const w = words[currentIndex];

    // Animation
    card.classList.remove('slide-left', 'slide-right');
    if (direction) {
      void card.offsetWidth;
      card.classList.add(direction === 'next' ? 'slide-left' : 'slide-right');
    }

    // Reset meaning
    meaningRevealed = false;
    document.getElementById('revealBtn').classList.remove('revealed');
    document.getElementById('meaningContent').classList.remove('visible');
    document.getElementById('revealBtn').querySelector('.icon').textContent = '›';

    // Word & pronunciation
    document.getElementById('frenchWord').textContent = w.word;
    document.getElementById('pronunciation').textContent = w.pron ? `-${w.pron}-` : '';

    // Type badge
    const typeEl = document.getElementById('wordType');
    if (w.type) {
      typeEl.textContent = w.type;
      typeEl.style.display = 'inline-block';
    } else {
      typeEl.style.display = 'none';
    }

    // Forme badge
    const formeEl = document.getElementById('wordForme');
    if (w.forme) {
      formeEl.textContent = w.forme;
      formeEl.style.display = 'inline-block';
    } else {
      formeEl.style.display = 'none';
    }

    // Hide meta row if both empty
    document.getElementById('wordMeta').style.display =
      (w.type || w.forme) ? 'flex' : 'none';

    // Meaning
    const meaningSection = document.getElementById('meaningSection');
    const meaningEl = document.getElementById('englishMeaning');
    if (w.meaning) {
      meaningEl.textContent = w.meaning;
      meaningSection.style.display = 'block';
    } else {
      meaningSection.style.display = 'none';
    }

    // Example
    const exSection = document.getElementById('exampleSection');
    const exFr = document.getElementById('exampleFr');
    const exEn = document.getElementById('exampleEn');
    if (w.exampleFr) {
      exSection.style.display = 'block';
      exFr.textContent = `"${w.exampleFr}"`;
      exEn.textContent = w.exampleEn || '';
      exEn.style.display = w.exampleEn ? 'block' : 'none';
    } else {
      exSection.style.display = 'none';
    }

    // Counter & progress
    document.getElementById('currentNum').textContent = currentIndex + 1;
    document.getElementById('totalNum').textContent = `/ ${words.length}`;
    document.getElementById('navLabel').textContent = `${currentIndex + 1} / ${words.length}`;
    document.getElementById('progressBar').style.width =
      `${((currentIndex + 1) / words.length) * 100}%`;

    // Nav buttons
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === words.length - 1;
  }

  function toggleMeaning() {
    meaningRevealed = !meaningRevealed;
    const btn = document.getElementById('revealBtn');
    const content = document.getElementById('meaningContent');
    if (meaningRevealed) {
      btn.classList.add('revealed');
      content.classList.add('visible');
      btn.querySelector('.icon').textContent = '↓';
    } else {
      btn.classList.remove('revealed');
      content.classList.remove('visible');
      btn.querySelector('.icon').textContent = '›';
    }
  }

  function nextCard() {
    if (currentIndex < words.length - 1) { currentIndex++; renderCard('next'); }
  }
  function prevCard() {
    if (currentIndex > 0) { currentIndex--; renderCard('prev'); }
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') nextCard();
    else if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === ' ') { e.preventDefault(); toggleMeaning(); }
  });

  // Swipe (mobile)
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, false);
  document.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) nextCard();
      else prevCard();
    }
  }, false);

  // =====================================================
  // START
  // =====================================================
  loadFromSheets();
</script>
</body>
</html>
